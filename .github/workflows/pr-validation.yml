---
name: PR Validation
on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, edited]
permissions:
  contents: read
  pull-requests: write
jobs:
  validate:
    uses: x71c9/ci-rust/.github/workflows/pr-validation.yml@master
    with:
      repo: ${{ github.event.repository.name }}
